name: Daily Bill Update

on:
  schedule:
    # Runs at 14:00 UTC (8:00 AM CST)
    - cron: '0 14 * * *'
  workflow_dispatch: 

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        # This now reads your requirements.txt file to install BeautifulSoup!
        run: pip install -r requirements.txt

      - name: Run data fetch script
        env:
          LEGISCAN_API_KEY: ${{ secrets.LEGISCAN_API_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        run: python fetch_bills.py

      - name: Run committee scraper
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        run: python scrape_committee.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # Using -A tells it to save ALL changed files, including your new .txt files
          git add -A
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update bills and committees" && git push)
